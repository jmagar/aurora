version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  allow:
  - dependency-type: all
  groups:
    minor:
      update-types:
      - minor
      - patch
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
