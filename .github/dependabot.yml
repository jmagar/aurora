version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  allow:
  - dependency-type: all
  groups:
    minor:
      # openwiki is 0.x, so a "minor" bump is breaking per semver, and it is an
      # AI agent tool with OAuth, MCP and connector surface — 0.1.2 -> 0.2.0 pulled
      # in the AWS SDK credential providers, google-auth-library and gcp-metadata
      # (lockfile refs 8 -> 185). ops/check-openwiki-pin.sh pins its version and
      # integrity hash precisely so that bump gets deliberate review. Grouping it
      # with routine UI bumps buries it in a 261-package diff and blocks the whole
      # group on the pin gate. Keep it in its own PR.
      exclude-patterns:
      - openwiki
      update-types:
      - minor
      - patch
  commit-message:
    prefix: deps
    prefix-development: deps
    include: scope
