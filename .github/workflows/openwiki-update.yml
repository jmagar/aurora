name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions: {}

concurrency:
  group: openwiki-update-main
  cancel-in-progress: false

jobs:
  generate:
    name: Generate without repository write authority
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: pnpm
      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.120.242.29
      - name: Install the lockfile-pinned OpenWiki graph without lifecycle scripts
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
        run: |
          test -n "$OPENAI_COMPATIBLE_API_KEY"
          response="$(mktemp)"
          status="$(curl --silent --show-error --location --output "$response" --write-out '%{http_code}' \
            --header "Authorization: Bearer $OPENAI_COMPATIBLE_API_KEY" \
            "$OPENAI_COMPATIBLE_BASE_URL/models" || true)"
          if [[ "$status" != 200 ]]; then
            echo "::error::OpenWiki API preflight failed with HTTP $status"
            head -c 300 "$response"
            exit 1
          fi
      - name: Run pinned OpenWiki
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
          OPENWIKI_MODEL_ID: gpt-5.3-codex-spark
        run: |
          test -n "$OPENAI_COMPATIBLE_API_KEY"
          pnpm exec openwiki --update --print
      - name: Export generated documentation only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openwiki-generated-${{ github.run_id }}
          path: openwiki
          if-no-files-found: error
          retention-days: 1

  propose:
    name: Create a fresh pull request without model credentials
    needs: [generate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out fresh main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Download generated documentation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: openwiki-generated-${{ github.run_id }}
          path: openwiki
      - name: Supersede stale automation pull requests and branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("openwiki/update")) | [.number, .headRefName] | @tsv' \
            | while IFS=$'\t' read -r number branch; do
                gh pr close "$number" --comment "Superseded by OpenWiki workflow run $GITHUB_RUN_ID."
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch" || \
                  echo "::warning::Could not delete stale branch $branch"
              done
      - name: Create OpenWiki update pull request from a unique fresh branch
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: openwiki
          branch: openwiki/update
          branch-suffix: timestamp
          delete-branch: true
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            Generation ran in a read-only job with the model credential. This
            pull-request job received only the generated `openwiki/` artifact.
