name: Public synthetics

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions: {}

concurrency:
  group: aurora-public-synthetics
  cancel-in-progress: true

jobs:
  public-path:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check landing, content negotiation, registry schema/checksum, revision, and TLS
        env:
          AURORA_PUBLIC_URL: ${{ vars.AURORA_PUBLIC_URL || 'https://aurora.tootie.tv' }}
          AURORA_TLS_MIN_SECONDS: ${{ vars.AURORA_TLS_MIN_SECONDS || '1209600' }}
          # Lets this monitor through Cloudflare's bot challenge on the tootie.tv
          # zone (see ops/synthetic-check.sh). dinglebear.ai is not proxied, so
          # its step below omits the token.
          AURORA_SYNTHETIC_TOKEN: ${{ secrets.AURORA_SYNTHETIC_TOKEN }}
        run: ops/synthetic-check.sh
      - name: Check the co-hosted dinglebear tenant
        env:
          AURORA_PUBLIC_URL: ${{ vars.AURORA_TENANT_URL || 'https://dinglebear.ai' }}
          AURORA_TLS_MIN_SECONDS: ${{ vars.AURORA_TLS_MIN_SECONDS || '1209600' }}
        run: ops/synthetic-check.sh
      - name: Alert on failure
        if: ${{ failure() }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.AURORA_ALERT_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          message="Aurora public synthetic failed: $RUN_URL"
          echo "::error::$message"
          if [[ -n "$ALERT_WEBHOOK_URL" ]]; then
            jq -n --arg message "$message" '{message: $message, service: "aurora"}' \
              | curl --fail --silent --show-error -H 'Content-Type: application/json' --data-binary @- "$ALERT_WEBHOOK_URL"
          fi
