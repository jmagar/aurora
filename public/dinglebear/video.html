<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>jmagar — Rust MCP family</title>
  <link rel="stylesheet" href="aurora.css">
  <style>
    html, body, #root {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #050d14;
      overflow: hidden;
      font-family: var(--font-sans);
      color: var(--aurora-text-primary);
    }
    *, *::before, *::after { box-sizing: border-box; }

    /* Aurora canvas — the deepest-navy flat plus the barely-perceptible
       two-corner aurora wash from the design system contract. */
    .stage-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 8% 0%,
          rgba(41, 182, 246, 0.08) 0%,
          rgba(41, 182, 246, 0.00) 60%),
        radial-gradient(ellipse 55% 45% at 100% 0%,
          rgba(103, 203, 250, 0.06) 0%,
          rgba(103, 203, 250, 0.00) 60%),
        var(--aurora-page-bg);
    }

    /* Subtle grain so flat surfaces don't look dead under capture. */
    .stage-bg::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image:
        radial-gradient(circle at 25% 25%, #fff 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, #fff 1px, transparent 1px);
      background-size: 4px 4px;
    }

    /* Hover-glow ring used by data points */
    .ring-pulse {
      animation: ring-pulse 2.4s var(--motion-ease-out) infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%      { opacity: 0.75; transform: scale(1.04); }
    }

    /* Terminal caret blink */
    .caret { animation: caret-blink 0.95s steps(1) infinite; }
    @keyframes caret-blink { 50% { opacity: 0; } }

    /* Skeleton/thinking shimmer used in Aurora-scene demo tiles */
    @keyframes shimmer {
      0%   { background-position: -150% 0; }
      100% { background-position:  150% 0; }
    }

    /* Hide the wrapping playback bar's default style — we use the starter as-is */
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="scenes.jsx"></script>

  <script type="text/babel">
    const DURATION = 78;

    function Root() {
      const rootRef = React.useRef(null);

      return (
        <div ref={rootRef} data-screen-label="00:00" style={{position:'absolute', inset:0}}>
          <Stage
            width={1920} height={1080}
            duration={DURATION}
            background="transparent"
            persistKey="rust-family-video"
          >
            <div className="stage-bg" />
            <LabelTicker rootRef={rootRef} />
            <TimeBridge />
            <VideoScenes />
          </Stage>
        </div>
      );
    }

    // Update data-screen-label every second so user comments carry timestamps.
    function LabelTicker({ rootRef }) {
      const t = useTime();
      React.useEffect(() => {
        if (!rootRef.current) return;
        const secs = Math.floor(t);
        const mm = String(Math.floor(secs/60)).padStart(2,'0');
        const ss = String(secs%60).padStart(2,'0');
        rootRef.current.setAttribute('data-screen-label', `${mm}:${ss}`);
      }, [Math.floor(t)]);
      return null;
    }

    // Test/probe helper: expose seek + play/pause on window so screenshots
    // can drop the playhead at a specific time without reloading.
    function TimeBridge() {
      const tl = useTimeline();
      React.useEffect(() => {
        window.__seek  = (t) => tl.setTime(t);
        window.__pause = () => tl.setPlaying(false);
        window.__play  = () => tl.setPlaying(true);
      }, [tl]);
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
