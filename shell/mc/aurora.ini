# Aurora — Midnight Commander truecolor skin.
# Dark-first navy / cyan, derived from the Aurora design system + Claude Code
# Aurora theme. Source: registry/aurora/styles/aurora.css,
# ~/.claude/themes/aurora.json, shell/statusline/statusline-aurora.sh.
#
# Requires: mc >= 4.8.19 built against S-Lang, 64-bit, a truecolor terminal,
# TERM=*-256color and COLORTERM=truecolor (all true on this host).
# Install: copy to ~/.local/share/mc/skins/aurora.ini, then `export MC_SKIN=aurora`
# (or Options -> Appearance -> aurora).

[skin]
    description = Aurora — dark navy / cyan (matches the Aurora design system)
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ╭
    righttop = ╮
    leftbottom = ╰
    rightbottom = ╯
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ═
    dvert = ║
    dlefttop = ╔
    drighttop = ╗
    dleftbottom = ╚
    drightbottom = ╝
    dtopmiddle = ╤
    dbottommiddle = ╧
    dleftmiddle = ╟
    drightmiddle = ╢

[aliases]
    # Aurora dark-theme tokens
    Navy        = #07131c
    Panel       = #0f2433
    PanelStrong = #13293a
    White       = #e6f4fb
    Muted       = #a7bcc9
    Dim         = #3d6070
    Cyan        = #29b6f6
    CyanHi      = #67cbfa
    DeepBlue    = #1c7fac
    Rose        = #f9a8c4
    RoseDeep    = #e879a0
    Violet      = #a78bfa
    Teal        = #7dd3c7
    Amber       = #c6a36b
    Error       = #c78490
    ErrorHi     = #d9909a
    Selection   = #1e4560
    Border      = #27516a

[core]
    _default_        = White;Navy
    selected         = Navy;Cyan;bold
    marked           = Rose;;bold
    markselect       = Navy;Rose;bold
    gauge            = Navy;CyanHi
    input            = White;Panel
    inputunchanged   = Muted;Panel
    inputmark        = Navy;CyanHi
    disabled         = Dim;Navy
    reverse          = Navy;Cyan
    commandlinemark  = Navy;CyanHi
    header           = CyanHi;;bold
    shadow           = Navy;Navy

[dialog]
    _default_     = White;PanelStrong
    dfocus        = Navy;Cyan;bold
    dhotnormal    = CyanHi
    dhotfocus     = Navy;Cyan;underline
    dtitle        = CyanHi;;bold

[error]
    _default_     = White;Error
    errdfocus     = Navy;ErrorHi
    errdhotnormal = Navy;;underline
    errdhotfocus  = Navy;ErrorHi;underline
    errdtitle     = White;;bold

[filehighlight]
    directory   = CyanHi
    executable  = Teal
    symlink     = Violet
    hardlink    =
    stalelink   = Error
    device      = CyanHi
    special     = Amber
    core        = Dim
    temp        = Dim
    archive     = Amber
    doc         = Violet
    source      = Cyan
    media       = CyanHi
    graph       = Teal
    database    = Rose

[menu]
    _default_     = White;DeepBlue
    menusel       = Navy;CyanHi;bold
    menuhot       = CyanHi;DeepBlue
    menuhotsel    = Navy;CyanHi;underline
    menuinactive  = Muted;DeepBlue

[popupmenu]
    _default_   = White;PanelStrong
    menusel     = Navy;Cyan
    menutitle   = Cyan;;bold

[buttonbar]
    hotkey = Navy;CyanHi;bold
    button = White;DeepBlue

[statusbar]
    _default_ = White;DeepBlue

[help]
    _default_   = White;PanelStrong
    helpbold    = Cyan;;bold
    helpitalic  = Teal;;italic
    helplink    = CyanHi;;underline
    helpslink   = Navy;CyanHi

[editor]
    _default_         = White;Navy
    editbold          = Rose;;bold
    editmarked        = White;Selection
    editwhitespace    = Dim;Navy
    editnonprintable  = ;Navy
    editlinestate     = Dim;Panel
    bookmark          = Navy;Amber
    bookmarkfound     = Navy;Teal
    editrightmargin   = Dim;Navy
    editbg            = ;Navy
    editframe         = DeepBlue
    editframeactive   = Cyan
    editframedrag     = CyanHi

[viewer]
    _default_       = White;Navy
    viewbold        = Cyan;;bold
    viewunderline   = CyanHi;;underline
    viewselected    = Navy;Amber

[diffviewer]
    added       = Navy;Teal
    changedline = Navy;Cyan
    changednew  = Navy;CyanHi
    changed     = Navy;Amber
    removed     = Navy;Error
    error       = White;Error

[widget-panel]
    sort-up-char    = ▴
    sort-down-char  = ▾
    hiddenfiles-show-char = •
    hiddenfiles-hide-char = ○
    history-prev-item-char = ‹
    history-next-item-char = ›
    history-show-list-char = ↡
    filename-scroll-left-char = ‹
    filename-scroll-right-char = ›

[widget-scrollbar]
    up-char         = ▲
    down-char       = ▼
    left-char       = ◄
    right-char      = ►
    thumb-char      = █
    track-char      = ░

[widget-editor]
    window-state-char = ─
    window-close-char = ✕
