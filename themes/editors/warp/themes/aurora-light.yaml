# Aurora Light — light cyan/teal, derived from the Aurora design system Aurora Light theme
# Source: ~/.claude/themes/aurora-light.json
# "Pop" tuning: more saturated accents for higher contrast on white.
name: Aurora Light
accent: "#0098e6"
# Vertical gradient: pure white at top fading to faint cyan-tint at bottom
background:
  top: "#ffffff"
  bottom: "#e6f1f6"
foreground: "#05121b"
details: lighter
terminal_colors:
  normal:
    black:   "#05121b"
    red:     "#b32a3d"
    green:   "#1f8a6e"
    yellow:  "#9a7410"
    blue:    "#0277c0"
    magenta: "#d6266a"
    cyan:    "#0098e6"
    white:   "#3d6070"
  bright:
    black:   "#7aa3b6"
    red:     "#e8557f"
    green:   "#2bb894"
    yellow:  "#c89422"
    blue:    "#16a0e6"
    magenta: "#7c3aed"
    cyan:    "#3fb0ee"
    white:   "#05121b"
