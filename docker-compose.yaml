services:
  aurora-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: aurora:dev
    container_name: aurora-dev
    ports:
      - "${AURORA_DEV_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      AURORA_BUILD_SHA: development
    volumes:
      - .:/app
      - aurora-node-modules:/app/node_modules
      - aurora-next-cache:/app/.next
      - aurora-pnpm-store:/pnpm/store
    command: >-
      sh -c "rm -rf /app/.next/cache && pnpm install --frozen-lockfile
      --config.confirmModulesPurge=false --store-dir /pnpm/store &&
      pnpm dev --hostname 0.0.0.0"
    restart: unless-stopped
    init: true
    pids_limit: 512
    mem_limit: 4g
    cpus: 4.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - dev

  aurora-prod-build:
    profiles: ["prod-build"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        AURORA_BUILD_SHA: "${AURORA_BUILD_SHA:-development}"
    image: "aurora:${AURORA_BUILD_SHA:-development}"
    container_name: aurora-prod-build
    ports:
      - "${AURORA_PROD_BUILD_PORT:-50001}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      AURORA_BUILD_SHA: "${AURORA_BUILD_SHA:-development}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,size=64m
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    init: true
    pids_limit: 128
    mem_limit: 4g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - prod-build

volumes:
  aurora-node-modules:
  aurora-next-cache:
  aurora-pnpm-store:

networks:
  dev:
    name: aurora-dev
  prod-build:
    name: aurora-prod-build
