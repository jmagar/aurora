services:
  aurora:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: aurora:local
    container_name: aurora
    ports:
      - "${AURORA_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - aurora-node-modules:/app/node_modules
      - aurora-next-cache:/app/.next
      - aurora-pnpm-store:/pnpm/store
    # Clear Turbopack's persistent cache on every (re)start so a corrupted cache
    # DB can never survive a restart and trigger a deadlock loop (see 2026-06-01 incident).
    command: sh -c "rm -rf /app/.next/cache && pnpm install --frozen-lockfile --config.confirmModulesPurge=false --store-dir /pnpm/store && pnpm dev --hostname 0.0.0.0"
    restart: unless-stopped
    # Detect a wedged dev server (holds the port but stops serving) so restart fires.
    healthcheck:
      # Use 127.0.0.1, not localhost: busybox wget tries IPv6 ::1 first, but Next
      # listens on IPv4 0.0.0.0 — localhost would falsely report unhealthy.
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - app

  aurora-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ${AURORA_IMAGE:-aurora}:${AURORA_TAG:-latest}
    container_name: aurora-prod
    ports:
      - "${AURORA_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1, not localhost: busybox wget tries IPv6 ::1 first, but Next
      # listens on IPv4 0.0.0.0 — localhost would falsely report unhealthy.
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app

volumes:
  aurora-node-modules:
  aurora-next-cache:
  aurora-pnpm-store:

networks:
  app:
    name: ${DOCKER_NETWORK:-aurora}
    external: true
